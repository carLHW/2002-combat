eCLI to LevelFactory--><g class="link" data-entity-1="ent0005" data-entity-2="ent0084" data-link-type="dependency" data-source-line="373" id="lnk87"><path codeLine="373" d="M1487.25,466.6394 C1487.25,549.7094 1487.25,659.6094 1487.25,659.6094 C1487.25,659.6094 1710.69,659.6094 1868.42,659.6094" fill="none" id="GameCLI-to-LevelFactory" style="stroke:#334155;stroke-width:1;"/><polygon fill="#334155" points="1874.42,659.6094,1865.42,655.6094,1869.42,659.6094,1865.42,663.6094,1874.42,659.6094" style="stroke:#334155;stroke-width:1;"/></g><!--link GameCLI to BattleEngine--><g class="link" data-entity-1="ent0005" data-entity-2="ent0071" data-link-type="dependency" data-source-line="374" id="lnk88"><path codeLine="374" d="M1317,466.7994 C1317,532.8594 1317,610.6094 1317,610.6094 C1317,610.6094 1107.62,610.6094 934.74,610.6094" fill="none" id="GameCLI-to-BattleEngine" style="stroke:#334155;stroke-width:1;"/><polygon fill="#334155" points="928.74,610.6094,937.74,614.6094,933.74,610.6094,937.74,606.6094,928.74,610.6094" style="stroke:#334155;stroke-width:1;"/></g><!--link Inventory to Item--><g class="link" data-entity-1="ent0017" data-entity-2="ent0044" data-link-type="dependency" data-source-line="376" id="lnk89"><path codeLine="376" d="M2044.61,2032.6094 C2175.44,2032.6094 2401.75,2032.6094 2401.75,2032.6094 C2401.75,2032.6094 2401.75,2113.2794 2401.75,2170.1594" fill="none" id="Inventory-to-Item" style="stroke:#334155;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#334155" points="2401.75,2176.1594,2405.75,2167.1594,2401.75,2171.1594,2397.75,2167.1594,2401.75,2176.1594" style="stroke:#334155;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="70.0718" x="2223.95" y="2029.1045">stores items</text></g><!--link UseItemAction to Item--><g class="link" data-entity-1="ent0037" data-entity-2="ent0044" data-link-type="dependency" data-source-line="377" id="lnk90"><path codeLine="377" d="M4505,2020.8294 C4505,2024.3794 4505,2026.6094 4505,2026.6094 C4505,2026.6094 2669.75,2026.6094 2669.75,2026.6094 C2669.75,2026.6094 2669.75,2111.8194 2669.75,2170.4294" fill="none" id="UseItemAction-to-Item" style="stroke:#334155;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#334155" points="2669.75,2176.4294,2673.75,2167.4294,2669.75,2171.4294,2665.75,2167.4294,2669.75,2176.4294" style="stroke:#334155;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="132.2344" x="3382.36" y="2041.1045">executes selected item</text></g><!--link LevelSetup to Combatant--><g class="link" data-entity-1="ent0085" data-entity-2="ent0008" data-link-type="dependency" data-source-line="378" id="lnk91"><path codeLine="378" d="M2020,987.3494 C2020,1022.8894 2020,1066.8994 2020,1111.3294" fill="none" id="LevelSetup-to-Combatant" style="stroke:#334155;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#334155" points="2020,1117.3294,2024,1108.3294,2020,1112.3294,2016,1108.3294,2020,1117.3294" style="stroke:#334155;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="104.0317" x="1915" y="1048.8345">stores enemy lists</text></g><g class="legend" data-source-line="380"><rect fill="none" height="154.875" rx="7.5" ry="7.5" style="stroke:#000000;stroke-width:1;" width="684.6592" x="2007.6704" y="2878.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="79.3447" x="2016.5601" y="2900.1426">OO concept</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="112.8135" x="2113.0288" y="2900.1426">Where it appears</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="87.9512" x="2016.5601" y="2917.752">Encapsulation</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="470.0117" x="2113.0288" y="2917.752">AbstractCombatant keeps HP, stats, actions, effects and cooldowns private.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="70.0342" x="2016.5601" y="2935.3613">Abstraction</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="570.4111" x="2113.0288" y="2935.3613">Combatant, Action, Item, StatusEffect, BattleView and BattleContext define stable contracts.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="88.6895" x="2016.5601" y="2952.9707">Polymorphism</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="511.3145" x="2113.0288" y="2952.9707">BattleEngine executes Action and manages Combatant objects through interfaces.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="69.2686" x="2016.5601" y="2970.5801">Inheritance</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="447.3984" x="2113.0288" y="2970.5801">Warrior/Wizard and Goblin/Wolf reuse the abstract combatant hierarchy.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="77.8135" x="2016.5601" y="2988.1895">Composition</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="455.2051" x="2113.0288" y="2988.1895">AbstractPlayer owns Inventory; BattleEngine owns its TurnOrderStrategy.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="52.1377" x="2016.5601" y="3005.7988">Strategy</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="498.8457" x="2113.0288" y="3005.7988">TurnOrderStrategy lets turn ordering be replaced without changing BattleEngine.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="46.6758" x="2016.5601" y="3023.4082">Factory</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="412.4258" x="2113.0288" y="3023.4082">LevelFactory creates LevelSetup objects for the selected Difficulty.</text><line style="stroke:#000000;stroke-width:1;" x1="2012.6704" x2="2687.3296" y1="2885.6094" y2="2885.6094"/><line style="stroke:#000000;stroke-width:1;" x1="2012.6704" x2="2687.3296" y1="2903.2188" y2="2903.2188"/><line style="stroke:#000000;stroke-width:1;" x1="2012.6704" x2="2687.3296" y1="2920.8281" y2="2920.8281"/><line style="stroke:#000000;stroke-width:1;" x1="2012.6704" x2="2687.3296" y1="2938.4375" y2="2938.4375"/><line style="stroke:#000000;stroke-width:1;" x1="2012.6704" x2="2687.3296" y1="2956.0469" y2="2956.0469"/><line style="stroke:#000000;stroke-width:1;" x1="2012.6704" x2="2687.3296" y1="2973.6563" y2="2973.6563"/><line style="stroke:#000000;stroke-width:1;" x1="2012.6704" x2="2687.3296" y1="2991.2656" y2="2991.2656"/><line style="stroke:#000000;stroke-width:1;" x1="2012.6704" x2="2687.3296" y1="3008.875" y2="3008.875"/><line style="stroke:#000000;stroke-width:1;" x1="2012.6704" x2="2687.3296" y1="3026.4844" y2="3026.4844"/><line style="stroke:#000000;stroke-width:1;" x1="2012.6704" x2="2012.6704" y1="2885.6094" y2="3026.4844"/><line style="stroke:#000000;stroke-width:1;" x1="2109.1392" x2="2109.1392" y1="2885.6094" y2="3026.4844"/><line style="stroke:#000000;stroke-width:1;" x1="2687.3296" x2="2687.3296" y1="2885.6094" y2="3026.4844"/></g><?plantuml-src xHfhS-EsyRj-1IR-KBcMVBbSBvUwgcTaYOuzuzTOlcHksau78bSIOf9W0T0-vPp_tiM3941HzbskcPxJVh4fx0EBVM6nm1_851HbAIGaJgcK965qAMX6bf23e0h75u9dHAs0nAKGa2iYHKmA6j_I9H2fH1chKi1-JzwolA2QTgRMgG4n16Mf1vaZsLBmCaycFEM2tA-O0WykLpJXzonVaWLDfGynqeqLyfoN2avZdi_Opq2-zb1IbeDQ5q2uK2lk0NAUW8I2l7xj3GgQtsuCkcNP1GY85SsNAVGKBuZYPCwLGbqaJ4COptjj-SY77Y57N2GWxFfsNhtwqqkSWP2n4Fo-FNZCS-N6Nhvy-TqtRtg_z7gAAPpyfXJvy8XADC24PtEgo9